[filters.dart-build-runner]
description = "Compact build_runner (dart run / legacy dart|flutter pub run) — strip AOT compile progress, per-file intermediate lines; keep builder summaries, warnings, errors, and final result"
match_command = "^(dart|flutter)\\s+(pub\\s+)?run\\s+build_runner\\b"
strip_ansi = true
filter_stderr = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*\\d+s compiling builders",
  "^W These options have been removed",
  ".*;\\s*\\S+\\.dart$",
]
# tail, not head: SEVERE failure blocks come at the end of the run
tail_lines = 60

[[tests.dart-build-runner]]
name = "full build with changes — strips progress, keeps builder summaries and final"
input = """
  1s compiling builders/aot
  2s compiling builders/aot
  3s compiling builders/aot
W These options have been removed and were ignored: --delete-conflicting-outputs
