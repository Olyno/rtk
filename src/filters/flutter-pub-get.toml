[filters.flutter-pub-get]
description = "Compact flutter pub get — strip download noise; keep summary, warnings, and hints"
match_command = "^flutter\\s+pub\\s+(get|add|upgrade|downgrade|outdated)\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Resolving dependencies",
  "^Downloading packages",
  "^  [a-zA-Z_][a-zA-Z0-9_-]* \\d",
]
max_lines = 60

[[tests.flutter-pub-get]]
name = "strips package lines, keeps summary and warnings"
input = """
Resolving dependencies...
Downloading packages...
  _fe_analyzer_shared 96.0.0 (103.0.0 available)
  _flutterfire_internals 1.3.71 (1.3.72 available)
  win32 5.15.0 (6.3.0 available)
  xml 6.6.1 (7.0.1 available)
Got dependencies!
59 packages have newer versions incompatible with dependency constraints.
Try `flutter pub outdated` for more information.
The following plugins do not support Swift Package Manager for ios:
  - patrol
  - flutter_secure_storage
"""
expected = "Got dependencies!\n59 packages have newer versions incompatible with dependency constraints.\nTry `flutter pub outdated` for more information.\nThe following plugins do not support Swift Package Manager for ios:\n  - patrol\n  - flutter_secure_storage"

[[tests.flutter-pub-get]]
name = "pub outdated — strips package lines, keeps summary"
input = """
Resolving dependencies...
Downloading packages...
  _fe_analyzer_shared 96.0.0 (103.0.0 available)
  win32 5.15.0 (6.3.0 available)
Dependencies resolved.
"""
expected = "Dependencies resolved."
